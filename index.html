  body { background: #fff; }

  .lp {
    width: 100%;

  .lp img.section {
    display: block;
    width: 100%;
    height: auto;
  }

  /* CTA画像＋光るLINEボタン */
  .cta-block { position: relative; }

  .shine-btn {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: inline-block;
    overflow: hidden;
  }
  .shine-btn img {
    display: block;
    height: 50px;
    width: auto;
  }
  .shine-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg,
      rgba(255, 255, 255, 0) 0%,
      rgba(255, 255, 255, .6) 50%,
      rgba(255, 255, 255, 0) 100%);
    transform: skewX(-20deg);
    animation: shine 2.5s infinite;
  }
  @keyframes shine {
    0% { left: -100%; }
    50% { left: 130%; }
    100% { left: 130%; }
  }

  .map { display: block; width: 100%; height: 450px; border: 0; }
</style>
