    left: -100%;
    width: 50%;
    height: 100%;

      rgba(255, 255, 255, .6) 50%,
      rgba(255, 255, 255, 0) 100%);

    animation: shine 2.5s infinite;

  @keyframes shine {

  }
  .hp-icon { width: clamp(22px, 3.4vw, 30px); height: auto; flex: none; }
  .hp-text {
